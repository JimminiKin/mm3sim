<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>MM3Sim - Marble Machine 3 Simulator</title>

    <link data-trunk rel="css" href="assets/style.css" />
  </head>
  <body>
    <link
      data-trunk
      rel="rust"
      href="Cargo.toml"
      data-wasm-opt="0"
      data-bin="mm3sim"
      data-initializer="assets/initializer.js"
    />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
      window.si =
        window.si ||
        function () {
          (window.siq = window.siq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
